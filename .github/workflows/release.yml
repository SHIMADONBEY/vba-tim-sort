name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Create archive and checksum
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE=vba-tim-sort-${VERSION}.zip
          git archive --format=zip --worktree-attributes --output="${ARCHIVE}" HEAD
          sha256sum "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload zip asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vba-tim-sort-${{ github.ref_name }}.zip
          asset_name: vba-tim-sort-${{ github.ref_name }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vba-tim-sort-${{ github.ref_name }}.zip.sha256
          asset_name: vba-tim-sort-${{ github.ref_name }}.zip.sha256
          asset_content_type: text/plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
